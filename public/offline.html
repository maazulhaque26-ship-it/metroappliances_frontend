<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Internet Connection | Metro Appliances</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #F5F5F5;
      color: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #FFFFFF;
      border: 1px solid rgba(17,17,17,0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .icon svg { color: #999999; }
    .brand {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #FF7A00;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #111111;
      margin-bottom: 12px;
      line-height: 1.1;
    }
    p {
      font-size: 14px;
      color: #666666;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    button {
      background: #111111;
      color: #ffffff;
      border: none;
      padding: 14px 36px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #333333; }
    .note {
      margin-top: 20px;
      font-size: 11px;
      color: #AAAAAA;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <div class="brand">Metro Appliances</div>
    <h1>You're offline</h1>
    <p>It looks like your internet connection was lost. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="note">Page will reload automatically when connection is restored.</p>
  </div>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
