name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Install · Build · Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check / lint (if configured)
        run: npm run lint --if-present

      # Build with stub env vars so Vite doesn't complain about missing VITE_ vars.
      # Vercel injects the real values at deploy time.
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.onrender.com/api
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          VITE_RAZORPAY_KEY_ID: rzp_test_placeholder

      - name: Verify dist exists
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          echo "Build output size: $(du -sh dist | cut -f1)"
          echo "JS chunks: $(find dist/assets -name '*.js' | wc -l)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7
