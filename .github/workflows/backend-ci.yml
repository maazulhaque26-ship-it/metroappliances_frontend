name: Backend CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Install · Lint · Syntax Check · Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (if configured)
        run: npm run lint --if-present

      # Syntax-check every JS file in the project without starting the server.
      - name: Syntax check — all JS files
        run: |
          echo "Checking syntax of all JS files..."
          find . -name "*.js" \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" \
            -not -path "*/scripts/*" \
            | xargs -I{} node --check {} \
            && echo "All files passed syntax check."

      - name: Verify required env vars are documented
        run: |
          REQUIRED="MONGO_URI JWT_SECRET CLIENT_URL STRIPE_SECRET_KEY"
          for var in $REQUIRED; do
            grep -q "$var" .env.example || \
              (echo "ERROR: $var missing from .env.example" && exit 1)
          done
          echo "All required env vars documented in .env.example"

      - name: Check .env is gitignored
        run: |
          grep -q "^\.env$" .gitignore || \
            (echo "ERROR: .env is NOT in .gitignore — secrets would be exposed!" && exit 1)
          echo ".env is gitignored ✓"

      - name: Check uploads dir is gitignored
        run: |
          grep -q "^uploads/" .gitignore || \
            (echo "ERROR: uploads/ is NOT in .gitignore" && exit 1)
          echo "uploads/ is gitignored ✓"

      - name: Run tests
        run: npm test
        env:
          MONGO_TEST_URI: mongodb://localhost:27017/metro_test
          JWT_SECRET: ci-test-secret-not-for-production
          NODE_ENV: test
